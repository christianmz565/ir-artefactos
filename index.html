<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Component Viewer Demo</title>
		<script type="module">
			import "wired-elements/lib/wired-input.js";
			import "wired-elements/lib/wired-button.js";
			import "wired-elements/lib/wired-combo.js";
			import "wired-elements/lib/wired-item.js";
			import "wired-elements/lib/wired-toggle.js";
			import "wired-elements/lib/wired-progress.js";
			import "wired-elements/lib/wired-card.js";
		</script>
		<script type="module" src="/src/lib/index.ts"></script>
		<script type="module" src="/src/components/admin-panel.ts"></script>
		<script type="module" src="/src/components/admin-page.ts"></script>
		<script type="module">
			import { registry } from "/src/lib/component-registry.ts";

			if (window.location.pathname === "/components") {
				document.body.innerHTML = "<admin-page></admin-page>";
			} else {
				registry.initialize();
			}
		</script>
		<style>
			body {
				font-family: system-ui, sans-serif;
				margin: 0;
				padding: 40px;
				background: #fafafa;
				color: #374151;
			}
			section {
				margin-bottom: 48px;
			}
			h2 {
				font-size: 18px;
				color: #111827;
				margin-bottom: 16px;
			}
			.form-group {
				margin-bottom: 16px;
			}
			.form-group label {
				display: block;
				margin-bottom: 4px;
				font-size: 14px;
				color: #6b7280;
			}
			.grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 16px;
			}
		</style>
	</head>
	<body>
		<h1>Component Viewer Demo</h1>
		<p style="color: #6b7280; margin-bottom: 32px">
			Press <strong>Ctrl+Shift+A</strong> to open the admin panel and copy
			component URLs.
		</p>

		<section>
			<h2>Input Fields</h2>
			<div class="grid">
				<div class="form-group">
					<label>Search</label>
					<wired-input
						data-component-id="search-input"
						data-component-label="Search Field"
						placeholder="Search..."
						style="width: 100%"
					></wired-input>
				</div>
				<div class="form-group">
					<label>Email</label>
					<wired-input
						data-component-id="email-input"
						data-component-label="Email Field"
						placeholder="email@example.com"
						style="width: 100%"
					></wired-input>
				</div>
			</div>
		</section>

		<section>
			<h2>Select & Toggle</h2>
			<div class="grid">
				<div class="form-group">
					<label>Status Filter</label>
					<wired-combo
						data-component-id="status-select"
						data-component-label="Status Filter Dropdown"
					>
						<wired-item value="all">All</wired-item>
						<wired-item value="active">Active</wired-item>
						<wired-item value="inactive">Inactive</wired-item>
					</wired-combo>
				</div>
				<div class="form-group">
					<label>Dark Mode</label>
					<wired-toggle
						data-component-id="dark-mode-toggle"
						data-component-label="Dark Mode Toggle"
					></wired-toggle>
				</div>
			</div>
		</section>

		<section>
			<h2>Actions</h2>
			<div class="grid">
				<div class="form-group">
					<wired-button
						data-component-id="submit-btn"
						data-component-label="Submit Button"
					>
						Submit
					</wired-button>
				</div>
				<div class="form-group">
					<wired-button
						data-component-id="cancel-btn"
						data-component-label="Cancel Button"
					>
						Cancel
					</wired-button>
				</div>
			</div>
		</section>

		<section>
			<h2>Progress</h2>
			<wired-progress
				data-component-id="upload-progress"
				data-component-label="Upload Progress Bar"
				value="65"
				style="width: 100%"
			></wired-progress>
		</section>

		<section>
			<h2>Nested: Form Card</h2>
			<wired-card
				data-component-id="login-card"
				data-component-label="Login Card"
				style="width: 100%; max-width: 400px; padding: 24px; display: block"
			>
				<div class="form-group">
					<label>Username</label>
					<wired-input
						data-component-id="login-username"
						data-component-label="Login Username"
						placeholder="Enter username"
						style="width: 100%"
					></wired-input>
				</div>
				<div class="form-group">
					<label>Password</label>
					<wired-input
						data-component-id="login-password"
						data-component-label="Login Password"
						type="password"
						placeholder="Enter password"
						style="width: 100%"
					></wired-input>
				</div>
				<wired-button
					data-component-id="login-btn"
					data-component-label="Login Button"
					style="width: 100%"
				>
					Sign In
				</wired-button>
			</wired-card>
		</section>

		<component-viewer></component-viewer>
		<admin-panel></admin-panel>
	</body>
</html>
